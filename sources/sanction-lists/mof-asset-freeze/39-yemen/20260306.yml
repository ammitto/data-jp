    remarks:
    - ja: 'スルタン・サーレハ・アイダアイダ・ザービンは、適用される国際人道法の違反及びイエメンにおける人権侵害を含め、イエメンの平和、安全及び安定を脅かす行為に関わってきた。 ザービンは、政治活動を行う女性に対する脅迫、並びに組織的な逮捕、拘禁、拷問、性的暴力及び強姦の実行政策において重要な役割を担ってきた。CID の局長としてザービンは、自宅軟禁、警察署、正式な刑務所、拘置所及び秘密に付された拘置所を含む複数の拘禁場所の使用に関し、直接責任を負い、又は、同人の権限により責任を負うとともに、共犯している。これらの場所では、少なくとも1 名の未成年者を含む女性が強制的に失踪させられ、繰り返し尋問され、強姦され、拷問され、適時の治療を拒否され、強制労働させられた。ザービン自身が直接拷問を加えた場合もあった。同人に対するインターポール（国際刑事警察機構）・国連安全保障理事会特別手配書のウェブ・リンク: https://www.interpol.int/en/How-we-work/Notices/View-UNNotices-Individuals'

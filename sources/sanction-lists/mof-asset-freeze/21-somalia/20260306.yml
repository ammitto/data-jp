    - ja: 住所：ソマリア 国連安全保障理事会決議第1844号(2008年)8(a)「2008年8月18日のジブチ合意、その政治過程を脅かす行為、ソマリア暫定連邦機関（TFIs）やアフリカ連合ソマリア・ミッション（AMISOM）を力で脅かす行為を含む、ソマリアの平和、安全、安定を脅かす行為に加担ないし支援を行っている」に従ってリストに記載。 カラテは、150名近くが死亡した2015年のケニア・ガリッサ大学襲撃を行った、アル・シャバーブの一翼であるアムニヤットにおいて、重要な役割を果たした。アムニヤットはアル・シャバーブの諜報機関の一翼であり、ソマリア、ケニア、地域のその他の国々における自爆テロや暗殺において重要な役割を果たしており、アル・シャバーブのテロ活動の後方支援や援助を提供している。同人に対するインターポール（国際刑事警察機構）・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals

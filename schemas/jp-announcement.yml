# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
# Schema for Japanese sanction list announcements
# Used for documents in sources/sanction-lists/

$id: jp-announcement
$schema: https://json-schema.org/draft/2020-12/schema

title: Japanese Sanction Announcement
description: |
  Schema for Japanese sanction list announcements including FEFTA End User List,
  asset freeze lists, and other sanctions-related announcements.

type: object

required:
  - announcement
  - sanction_details

properties:
  announcement:
    type: object
    description: Announcement metadata
    required:
      - title
      - publish_date
      - authority
    properties:
      title:
        type: string
        description: Japanese title of the announcement
      title_en:
        type: string
        description: English title of the announcement
      url:
        type: string
        format: uri
        description: URL to the official announcement
      publish_date:
        type: string
        format: date
        description: Date of publication
      publish_time:
        type: string
        pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
        description: Time of publication (HH:MM format)
      authority:
        type: string
        description: Issuing authority ID
        examples:
          - jp/meti
          - jp/mof
          - jp/mofa
      publisher:
        type: string
        description: Publisher organization
      type:
        type: string
        description: Document type
        enum:
          - jp/end-user-list-announcement
          - jp/asset-freeze-announcement
          - jp/ministerial-announcement
          - jp/public-notice
      document_id:
        type: string
        description: Official document identifier
      content:
        type: string
        description: Full text content of the announcement

  sanction_details:
    type: object
    description: Details of sanctions imposed
    required:
      - instruments
      - entities
    properties:
      instruments:
        type: array
        description: Legal instruments providing authority
        items:
          type: object
          required:
            - id
          properties:
            id:
              type: string
              description: Legal instrument ID
              examples:
                - jp/diet-foreign-exchange-and-foreign-trade-act
                - jp/cabinet-order-foreign-exchange
            articles:
              type: array
              items:
                type: string
              description: Specific articles cited
      entities:
        type: array
        description: List of sanctioned entities
        items:
          $ref: '#/$defs/entity'

$defs:
  entity:
    type: object
    description: Sanctioned entity (person or organization)
    required:
      - name
      - type
      - effective_date
      - sanction_list
    properties:
      name:
        type: object
        description: Entity names in multiple languages
        properties:
          ja:
            type: string
            description: Japanese name
          en:
            type: string
            description: English name
          zh-Hans:
            type: string
            description: Simplified Chinese name
          ko:
            type: string
            description: Korean name
        additionalProperties: true
      type:
        type: string
        description: Entity type
        enum:
          - individual
          - organization
          - vessel
          - aircraft
      effective_date:
        type: string
        format: date
        description: Date sanctions take effect
      effective_time:
        type: string
        pattern: "^([01]?[0-9]|2[0-3]):[0-5][0-9]$"
        description: Time sanctions take effect (HH:MM)
      sanction_list:
        type: string
        description: Japanese name of the sanction list
      sanction_list_en:
        type: string
        description: English name of the sanction list
      country:
        type: string
        description: Country or region of the entity
      reason:
        type: array
        description: Reasons for sanction
        items:
          type: object
          properties:
            ja:
              type: string
            en:
              type: string
      measures:
        type: array
        description: Sanction measures imposed
        items:
          $ref: '#/$defs/measure'
      aliases:
        type: array
        description: Alternative names
        items:
          type: string
      address:
        type: string
        description: Physical address
      title:
        type: object
        description: Title/position (for individuals)
        properties:
          ja:
            type: string
          en:
            type: string
      gender:
        type: string
        description: Gender (for individuals)
        enum:
          - male
          - female
          - other
      date_of_birth:
        type: string
        format: date
        description: Date of birth (for individuals)
      identification:
        type: object
        description: Identification information
        properties:
          passport:
            type: string
          national_id:
            type: string
          tax_id:
            type: string

  measure:
    type: object
    description: Sanction measure
    required:
      - type
    properties:
      type:
        type: array
        description: Measure type codes
        items:
          type: string
          enum:
            - asset_freeze
            - prohibit_transactions
            - prohibit_import_export
            - entry_ban
            - visa_ban
            - export_license_requirement
            - import_license_requirement
            - prohibit_transfer_provide_dual_use_items
            - prohibit_export_dual_use_items
            - financial_prohibition
            - arms_embargo
      ja:
        type: string
        description: Japanese description
      en:
        type: string
        description: English description

additionalProperties: false

    - type: list-item
      index: '2'
      label: 二
      content:
      - 法第五十三条第一項又は第二項の規定により禁止された業務を統括する者その他これに準ずる者として経済産業省令で定める者（前号に掲げる者を除く。）
- type: clause
  index: '11'
  label: 第十一条
  title: "（報告）"
  content:
  - 経済産業大臣は、法（第六章及び第六章の三に限る。）及びこの政令の施行に必要な限度において、貨物を輸出しようとする者、貨物を輸出した者又は当該貨物を生産した者その他の関係人から必要な報告を徴することができる。
- type: clause
  index: '12'
  label: 第十二条
  title: "（権限の委任）"
  content:
  - 次に掲げる経済産業大臣の権限は、税関長に委任されるものとする。
  - type: numbered-list
    index: '1'
    content:
    - type: list-item
      index: '1'
      label: 一
      content:
      - 別表第二の三九から四一まで及び四三の項の中欄に掲げる貨物（同表の四三の項の中欄に掲げる貨物にあつては、経済産業大臣が告示で定めるものを除く。）に係る第二条第一項の規定による承認の権限
    - type: list-item
      index: '2'
      label: 二
      content:
      - 次に掲げる権限であつて、経済産業大臣の指示する範囲内のもの
      - type: numbered-list
        content:
        - type: list-item
          index: '1'
          label: イ
          content:
          - 価額の全部につき支払手段による決済を要しない貨物に係る第二条第一項の規定による承認の権限
        - type: list-item
          index: '2'
          label: ロ
          content:
          - 保税地域に搬入し、蔵入れし、又は移入された貨物であつて、保税地域から積み戻す貨物に係る第二条第一項の規定による承認の権限
        - type: list-item
          index: '3'
          label: ハ
          content:
          - 法第六十七条第一項の規定によりイ又はロの承認に条件を付する権限
        - type: list-item
          index: '4'
          label: ニ
          content:
          - 第八条第二項の規定により、法第四十八条第一項の規定による許可又は第二条第一項の規定による承認の有効期間を延長する権限
- type: clause
  index: '13'
  label: 第十三条
  title: "（政府機関の行為）"
  content:
  - 経済産業大臣が貨物の輸出を行う場合は、この政令の規定は、適用しない。
  - 第五条の規定は、前項の場合に準用する。
- type: clause
  index: '14'
  label: 第十四条
  title: "（核兵器等の開発等に用いられるおそれが特に大きい貨物）"
  content:
  - 法第六十九条の六第二項第二号に規定する政令で定める貨物は、別表第一の一の項（（五）、（六）及び（十）から（十二）までを除く。）及び同表の二から四までの項の中欄に掲げる貨物（核兵器等を除く。）とする。

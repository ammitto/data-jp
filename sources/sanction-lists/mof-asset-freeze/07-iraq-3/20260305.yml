    remarks:
    - ja: アル・アルビー社は前イラク政権の軍事調達に従事していた多数の会社の最終的な親会社である。1991年には、新聞記事の中で、アル・アラビー社はイラクの核・生物兵器やミサイル計画のための部品と機材調達に従事していたイラク政府の団体であるとされた。 アル・アラビー社は以前、軍事産業委員会の下にあり、1993年11月に清算されたとしてイラク側から主張されていた。当時、アル・アラビー社は産業省や特別プロジェクト技術協力（TECOまたはTechcorp）と呼ばれる軍事産業傘下により管理されていた。 アル・アラビー社は12もの偽装会社の最終的な親会社である。アル・アラビー社はTMG Enginerring Limitedを所有する英国の株式会社Technology and Development Group Limitedの99％を所有している。TDG/TMGは1980年代後半にイラクの武器調達ネットワークに関与していた。

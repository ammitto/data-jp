    remarks:
    - ja: ジミー・シュリジエ（Jimmy Cherizier）は、ハイチの平和、安全及び安定を脅かす行為に関与し、深刻な人権侵害を構成する行為を計画、指示又は実行した。 ジミー・シュリジエはハイチで最も影響力のあるギャングの指導者の1人で、「G9 Family and Allies」として知られるハイチギャングの同盟を率いている。

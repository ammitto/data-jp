    - ja: ウィルソン・ジョゼフ（別名 Lanmo San Jou）は、首都圏にて活動を行う「400 Mawozo」ギャングの指導者。 同人はギャング構成員による深刻な基本的人権の侵害及び一般市民への無差別攻撃による殺害及び傷害、人道支援の妨害、強姦、未成年の徴用、公共財産の破壊活動への直接又は間接的な責任を負っている。同活動によって多くの国内避難民が発生している。同人はハイチ国家警察より指名手配を受けている。

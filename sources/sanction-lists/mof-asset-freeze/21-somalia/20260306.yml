      en: Subject to asset freeze
    remarks:
    - ja: アブード・ロゴ・モハンメドはケニアを拠点として活動するイスラム過激派の指導者(cleric)であり、ソマリアに関する決議第751号（1992年）及びエリトリアに関する決議第1907号（2009年）に従って設立された安保理制裁委員会によって、直接または間接的にソマリアの平和、安全または安定を脅かす行為に従事する団体として指定されたアル・シャバーブに対して資金、物資、輸送又は技術的な支援を提供することによってソマリアの平和、安全又は安定を脅かしている。同人は、東アフリカ一帯に暴力を促進する宣伝活動の一環として、東アフリカ域内で過激派グループに対し影響力を行使している他、アル・シャバーブの資金調達活動も行っている。また同人はアル・ヒジラ（Al Hijra、旧ムスリム・ユース・センター）の主要な思想的指導者として、ソマリアにおける暴力的活動を実行するために主にスワヒリ語を話すアフリカ人を過激化し採用するための経路として過激派集団を使用している。2009年2月から2012年2月の間に実施された一連の煽動講義において、同人は、ソマリアの和平プロセスに対し、暴力による中断を繰り返し呼びかけた。また、同講義において、同人は、ソマリアで活動する国連及びアフリカ連合ソマリア・ミッション（AMISOM）軍に対し暴力を行使するよう繰り返し呼びかけ、聴衆に対し、ソマリアに渡航し、アル・シャバーブに参加してケニア政府と戦うよう呼びかけた。同人は、アル・シャバーブに加わったケニア人新兵に対し、ケニア当局の捜査のかわし方やモンバサやラムからキスマヨを初めとしたソマリア内のアル・シャバーブ拠点への道順についても指導している。また、同人は、アル・シャバーブに加わる非常に多くのケニア人新兵のソマリアへの渡航を手助けした。2011年9月、同人は、ケニアのモンバサにて、テロ活動を行わせるためにソマリアへ渡航させる人の募集活動をしており、2008年9月には同地にてソマリアにおけるアル・シャバーブの活動を支援するための資金集め会合を実施した。

    sanction_list: jp/mof-asset-freeze-yemen
    sanction_list_en: Republic of Yemen
    list_date: 2015年4月14日（2016年8月26日改訂）
    aliases:
    - アブドルマリク・アル・ホーシー（Abdulmalik al-Huthi）
    reason:
    - ja: アブドルマリク・アル・ホーシーは、安全保障理事会決議第2140号（2014年）の11及び15の規定並びに安全保障理事会決議第2216号（2015年）の14の規定に従い、2015年4月14日に制裁対象に指定された。 アブドルマリク・アル・ホーシーは、イエメンの平和、安全又は安定を脅かす活動に関与してきた集団の指導者の一人である。 2014年9月、ホーシー派部隊がサヌアを奪取し、2015年１月、ホーシー派が支配する正統でない統治当局を通じて、イエメンの正統な政府を交代させようと一方的に試みた。アブドルマリク・アル・ホーシーは、兄フセイン・バドルッディーンの死後2004年に、イエメンのホーシー派運動の指導的地位を担っている。ホーシー派の指導者として、アブドルマリク・アル・ホーシーは、自らの要求に応じない場合に更なる騒擾を引き起こすことでイエメン当局を繰り返し脅迫し、ハーディ大統領、首相、主要閣僚を拘留した。ハーディ大統領は、その後アデンに逃れた。ホーシー派は、サーレハ前大統領とその息子アフマド・アリー・サーレハに対して忠実な軍部隊の支援を得て、アデンに対する新たな攻勢に出た。
    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: イエメンのホーシー派集団指導者。イエメンの平和、安全又は安定を脅かす活動に関与してきた。

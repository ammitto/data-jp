    address: "(a)中央アフリカ共和国ヴァカガ県（Vakaga）、(b)中央アフリカ共和国オート・コット県（Haute-Kotto）、(c)中央アフリカ共和国バス・コット県（Basse-Kotto）、(d)中央アフリカ共和国オー・ムボムー県（Haut-Mbomou）、(e)中央アフリカ共和国ムボムー県（Mbomou）、(f)コンゴ民主共和国オー・ウエレ州（Haut-Uolo）、(g)コンゴ民主共和国バ・ズエレ州（Bas-Uolo）、(h)報告されている住所：カフィア・キンジ地域（Kafia Kingi）（最終的な地位が確定していないスーダン共和国と南スーダン共和国の国境地帯にある領域）。2015年1月時点で、神の抵抗軍500名がスーダン共和国から追放されたとの報告がある。"
    list_date: '2016-03-07'

    remarks:
    - ja: ヒセーヌは、ミシェル・ジョトディア（Michel Djotodia）元中央アフリカ大統領政権下において青年・スポーツ大臣であった。それ以前は、正義平和愛国者協定（Convention of Patriots for Justice and Peace）という政治団体の代表であった。また、同人は、バンギ、特に「ＰＫ５」（第３地区）周辺における武装民兵の指導者として、自身の地位を確立した。2016年10月、アブドゥライエ・ヒセーヌは、当時旧セレカの全派閥から軍事指導者及び指揮戦闘員を集めるために作られた組織である国防評議会（ＣＮＤＳ）の代表の職に就任した。その後も同職に就いているが、実際には中央アフリカ復興人民戦線（ＦＰＲＣ）の戦闘員のみを統制している。父の氏名はアブドゥレ（Abdoulaye）である。母の氏名はアブスィタ・ムーサ（Absita Moussa）である。写真はインターポール(国際刑事警察機構)・国連安全保障理事会特別手配書に含まれているものを利用可能。同人に対するインターポール(国際刑事警察機構)・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals

    - ja: マーリム・サルマンは、アル・シャバーブ指導者であるアフメド・アブディ・アウ・モハメド（Ahmed Abdi aw-Mohamed）（別名ゴダネ（Godane））により、アル・シャバーブのアフリカにおける外国人戦闘員の長に指名された。同人は、アフリカにおける外国人戦闘員としてアル・シャバーブに参加しようとする外国人を訓練し、観光客、娯楽施設及び教会を標的としたアフリカにおける作戦に関与してきた。 主にソマリア国外の作戦に注力していたが、サルマンはソマリア国内に居住し、外国人戦闘員を国外に送り出す前にソマリアで訓練することで知られている。アル・シャバーブの外国人戦闘員の中には、ソマリア国内で活動する者もある。例えば、サルマンは、アフリカ連合ソマリア・ミッション（AMISOM）による攻勢に対して、アル・シャバーブの外国人戦闘員をソマリア南部に展開するよう指示した。 他のテロ攻撃の中で、アル・シャバーブは少なくとも６７名が死亡する結果となった2013年9月のケニア・ナイロビのウェストゲート・ショッピングモールにおける攻撃に責任がある。さらに最近、アル・シャバーブは、3名の警備員及び２名の民間人が死亡し、15名が負傷した2014年8月31日のモガディシュにおける国家情報治安庁（National Intelligence and Security Agency）の刑務所に対する攻撃についても犯行を主張している。

      en: Muhammad Yunis Ahmad
    type: individual
    effective_date: '2010-07-16'
    sanction_list: jp/mof-asset-freeze-iraq-1
    sanction_list_en: Former Iraqi Regime Officials (I)
    date_of_birth: 1949-XX-XX
    place_of_birth: モースル、アル・モワール（イラク）
    nationality: イラク
    aliases:
    - ムハンマド・ユーニース・アル・アフマド
    - ムハンマド・ユーニース・アフメド
    - ムハンマド・ユーニース・アフマド・アル・バドラーニー
    - ムハンマド・ユーニース・アフメド・アル・モアリー Muhammad Yunis Al-Ahmed, Muhammad Yunis Ahmed, Muhammad Yunis Ahmad Al-Badrani, Muhammad Yunis Ahmed Al-Moali
    reason:
    - ja: イラク政府及び米国政府の入手可能な情報によれば、ムハンマド・ユーニース・アフマドは、1990年の湾岸戦争以前、アル・ムサンナー県知事であった。湾岸戦争後、イラク北部においてバアス党幹部に昇進した。同人は、バアス党の地方司令部の一員であり、また、サラーハッ・ディーン県、タミーム県及びスライマーニーヤ県における同党活動に責任を負っていた。同人は、2003年のフセイン政権崩壊まで同地位にあった。また、アフマド氏は、米国大統領令（US Executive Order）13315の附属書に掲載され本表の6番目に記されており、司令部で同人に次ぐ職を務めていたとされるイッザト・イブラーヒーミ・アッ・ドゥーリーと近い職務上の関係にあると報告されている。イラクの自由作戦後、連合暫定施政当局によるバアス党の廃止の後に、同党は、新しい指導部の下で再編成を行った。イラク政府及び米国政府の入手可能な情報によれば、再編成されたイラク・バアス党は、アッ・ドゥーリー氏を党首とし、またアフマド氏を副党首として再編成されていると伝えられている。最近、同人は、バアス党の事務局長に選出された。イラク政府及び米国政府の情報によれば、アッ・ドゥーリー氏は、サッダーム政権崩壊後に形成された反連合軍グループの軍事部門を率い、アフマド氏が同グループの政治部門を率いている。
    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: 住所：ブルダーン、アル・ダワール・ストリート（シリア）、ダマスカス（シリア）、モースル（イラク）、ワーディー・アル・ハーウィー（イラク）、ドバイ（アラブ首長国連邦）、アル・ハッサケ（シリア）

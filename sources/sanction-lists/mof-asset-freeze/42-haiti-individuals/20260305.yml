    remarks:
    - ja: ルネル・デスティナは、「Grand Ravine」ギャングの指導者であり、ジョンソン・アンドレと主な同盟関係にある。「Grand Ravine」は、約300名の構成員を有しており、ハイチの安全及び安定を脅かす様々な活動に関与した。同人の指導の下、「Grand Ravine」ギャングは殺人、強姦、武装強盗、財産の破壊、身代金を目的とした誘拐、車両窃盗及び土地の接収を含め犯罪行為が行われた。 2022年以降、同ギャングは支配地域を拡大しており、ハイチ国家警察の殺害、強盗、警察署への攻撃を繰り返している。 同ギャングは国内幹線道路沿いを支配下に置き、恐喝、車両の強奪、密輸及びその他違法な活動によって資金を得ている。国内要衝を支配することで、国内経済の停滞を引き起こし人道支援の提供を妨害した。

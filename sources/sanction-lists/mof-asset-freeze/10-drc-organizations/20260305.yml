  - id: jp.mof.drc-organizations.1
    name:
      ja: エーディーエフ
      en: ADF
    type: organization
    effective_date: '2015-07-31'
    sanction_list: jp/mof-asset-freeze-drc-organizations
    sanction_list_en: Democratic Republic of the Congo (Entities)
    address: コンゴ民主共和国北キヴ州
    list_date: 2014年6月30日 （2016年10月19日及び2020年8月19日修正）
    aliases:
    - 民主同盟軍（Allied Democratic Forces）
    - "(a)民主同盟軍－ウガンダ解放国民軍（Forces Democratiques Alliees-Armee Nationale de Liberation de l’Ouganda）"
    - "(b)ADF/NALU"
    - "(c)NALU"
    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: ADF創設者であり指導者でもあるジャミール・ムクルは、2015年4月にタンザニアのダルエルサラームで逮捕された。ムクルは、その後、2015年7月にウガンダのカンパラに引き渡された。2016年6月現在、ムクルは裁判のため、警察の留置場に勾留されていると伝えられる。なお、ADFの全体指導者としてセカ・バルクがジャミール・ムクルの後継者となった。コンゴ民主共和国に関する専門家グループの複数の報告書において強調されているように、ADFは、セカ・バルクの指導下のものを含め、繰り返し、付け狙い、殺害及び傷害行為、強姦及びその他の性的暴力、児童を含む文民の誘拐、並びに村落や保健施設に対する攻撃を、特に2019年2月12日及び24日にベニ地区（Beni）マモーヴ（Mamove）において、2019年12月5日及び2020年1月30日にベニ地区（Beni）マントゥンビ（Mantumbi）において行い続けた。また、ADFは、少なくとも2015年から、コンゴ民主共和国ベニ地区（Beni）において、児童の継続的な徴募、襲撃時における児童の使用及び児童の強制労働を行い続けた。同団体に対するインターポール(国際警察刑事機構)・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Entities

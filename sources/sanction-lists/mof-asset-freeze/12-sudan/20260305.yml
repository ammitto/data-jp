      en: Abdel Rahman Juma Barkalla
    type: individual
    effective_date: '2025-04-11'
    sanction_list: jp/mof-asset-freeze-sudan
    sanction_list_en: Sudan
    title:
      ja: 即応支援部隊(ＲＳＦ)少将・西ダルフール司令官
    date_of_birth: '1969-01-01'
    place_of_birth: 東ダルフールのバール・エララブ(Bahr Elarab)
    nationality: スーダン
    list_date: '2024-11-08'
    reason:
    - ja: アブデル・ラフマーン・ジュマ・バラカッラー（ＲＳＦ少将・西ダルフール司令官）は、暴力行為や人権侵害を含め、ダルフールの平和、安全、安定を脅かす行動や政策に関与したため、指定される。ダルフールにおけるＲＳＦの攻撃は、激しい戦闘、人道的アクセスの欠如、市民や人権活動家を標的とする暴力により、何十万人もの市民を危険にさらしてきた。２０２３年５月及び６月、西ダルフールのエル・ジュネイナでは、市民社会の代表が、ＲＳＦとその同盟民兵による標的を絞った脅迫と殺害に直面した。２０２３年８月４日、南ダルフールのニヤラで、ＲＳＦの制服を着た武装集団が人権活動家で弁護士のアフメド・モハメッド・アブドラとその同僚のアダム・オメルを拉致、殺害した。２０２３年６月１４日に殺害された西ダルフール州知事のカミス・アバカールが最後に目撃されたのはバラカッラーと一緒の時だった（専門家パネル報告Ｓ／２０２４／６５パラ７１参照。）。ソーシャルメディア上の動画では、アバカールがＲＳＦの兵士によって建物に押し込められる様子が映し出され、その数時間後には、アバカールの遺体とその周りで喜ぶＲＳＦの制服を着た兵士たちを映した２つ目の動画が公開された。２０２３年５月から１１月にかけて、ＲＳＦとその同盟民兵は、西ダルフールのエル・ジュネイナとアルダマタの町で、少なくとも１０回の市民に対する攻撃を行い、数千人を殺害し、１３か所以上の集団墓地に埋めた。また、これらの攻撃の最中に女性や女児が強姦され、性的虐待を受けたと報告されている。

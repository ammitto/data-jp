  - id: jp.mof.iraq-3.197
    name:
      ja: アル・ワセル・バーベル総合貿易LLC
      en: AL WASEL AND BABEL GENERAL TRADING LLC
    type: organization
    effective_date: '2004-08-26'
    sanction_list: jp/mof-asset-freeze-iraq-3
    sanction_list_en: Former Iraqi Regime Officials (III)
    address: アラブ首長国連邦、ドバイ、ラシディーヤ、私書箱10631号及び638号、アル・ラムール通り、イブラーヒーム・サイード ルータ ビルディング アラブ首長国連邦、ドバイ、ラシディーヤ、航空クラブ近く、空港通り、ルータビルディング イラク、バグダッド、ハラシーヤ地区のヴィラ
    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: アル・ワセル・バーベル総合貿易LLC（AWB）は前イラク政権が国連石油食糧交換（OFF）計画を通じて購入した物資の10%のリベートを獲得し、国連により認可されていない物資を調達するために利用されていたアラブ首長国連邦にある会社である。 2001年1月2日付の前政権イラク副首相兼財務相ヒクマト・ミズバン・イブラヒーム・アル・アッザウィが署名した書簡には、国連石油食糧交換計画の下で他国から購入したすべての物資に対してイラク政府が10％の手数料支払を得る旨の指示が記述されている。同書簡には、イラク政府職員に対する貿易会社を通じた物資購入の指示があるが、その貿易会社の一つがAWBである。 アル・アッザウィからの別の書類には、イラクとの貿易に従事している会社から10％の手数料を集めるための手続きが示されている。同書類にはヨルダンにあるラーフィダイーン銀行がこうした取引における資金の受け皿として使うことができること、また、AWBが物資取引のために使われることとなる旨が明記されている。 米国が保有する情報によれば、AWBはイラクによる高性能地対空ミサイルシステム購入の試みに関わっていたとされる。約43.5百万米ドルがUAE銀行に残されていたが、これは、当該ミサイル購入契約の条件の下で、このシステムの部分的な支払いとして使われるべきものであった。軍事用品を含むこの種の購入は、対イラク国連制裁下で禁止されていた。 フロリダ・タンパのアメリカ入国管理局（BICE）による、当該ミサイル取引に関する調査は、以下のことを明らかにした。 － AWBの商用口座は、UAE国籍の者1名と旅券からイラク政府職員であると判明したイラク人のヒクマト・ジョルジュース・バーナムによって、2000年12月にアブダビ国立銀行（NBAD）に開設された。両名は、AWBへの取引が許可されたとして指名を受けている。イラク国籍保持者であるターリク・ナーセル・Ｓ・アル・オバイディーもこの口座の名義人であった。 － NBAD商用口座の初期取引の一つには、2000年12月のヒクマト・マズバーン・イブラヒーム（おそらくはヒクマト・ミズバーン・イブラヒーム・アル・アッザーウィである。）の指示による7百万米ドルの入金があった。その直後、7百万米ドルのうち6.9百万米ドルが、アル・アッザーウィーの指示により、ＡＷＢの2番目の口座へ送金された。 － 2001年初頭から2002年初頭にかけてＡＷＢの二つの口座間で多数の追加送金があり、その結果、一方の口座の残高は43.5百万米ドルとなった。 － 調査中に得られた文書によると、その43.5百万米ドルの残高は、レーダーコントロールによる地対空ミサイルシステムをイラクに売却することを目的とする「契約Ｎ24398」に直接関連していた。 アブダビ国立銀行のある職員はアメリカ合衆国BICE調査員に対して、43.5百万米ドルの残高を有するAWBの口座が、イラク人のみを預金にアクセスできる署名者としていたことは異常である旨述べた。その銀行職員は調査員に対し、UAE市民である同社の社長は当該預金を管理することができず、イラク政府及びその代理人がAWBの実質的な所有者であったと述べた。 以前にイラク中央銀行の総裁を務め、2001年時点で、AWB事務所職員の一人であったイラク人、ターリク・アル・ウバイディーと、以前イラク中央銀行に雇用されていたイラク人のジョセフ・ギルギースはドバイにおけるウダイ・サッダーム・フセインの代理人として活動していた。

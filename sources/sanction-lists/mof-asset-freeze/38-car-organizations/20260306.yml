    remarks:
    - ja: 1980年代にウガンダ北部で誕生した。中央アフリカ共和国の数百名を含め、中部アフリカの市民数千人の拉致、殺害及び身体切断に従事している。指導者はジョセフ・コニー（制裁対象個人リストの9番目に掲載）である。同団体に対するインターポール(国際刑事警察機構)・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Entities

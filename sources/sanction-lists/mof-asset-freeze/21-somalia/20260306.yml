    remarks:
    - ja: 住所：マジェンゴ地区、モンバサ、ケニア アブバケール・シャリフ・アフメドはソマリアにおける暴力的軍事活動を実行するムスリム系ケニア人青年層の指導的な世話人であり、採用者であるとともに、アブ－ド・ロゴの親しい関係である。同人はケニア及び東アフリカのその他の地域において過激派グループに物資的支援を行うとともに、キスマヨを含むソマリア国内のアル・シャバーブの拠点への頻繁な渡航を通じて、アル・シャバーブ上層部との密接な関係を維持している。また、ソマリアに関する決議第751号（1992年）及びエリトリアに関する決議第1907号（2009年）に従って設立された安保理制裁委員会によって、直接または間接的にソマリアの平和、安全または安定を脅かす行為に従事する団体として指定されたアル・シャバーブのための資金調達に従事している。同人は、モンバサのモスクにおいて、青年は、ソマリアに渡航し、過激派の活動に加わり、アルカイーダのために戦って、米国民を殺害すべきであると説いた。同人は、ナイロビのバス・ターミナルの爆破に関与していた疑いで2010年12月下旬、ケニア当局に逮捕された。また、同人はケニアに拠点を置き、アル・シャバーブと関係を持つモンバサの青年組織の指導者でもある。2010年の時点で、同人はモンバサのマジェンゴ地区において、アル・シャバーブの採用担当者及び世話人として活動していた。

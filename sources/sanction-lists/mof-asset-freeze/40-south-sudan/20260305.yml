    remarks:
    - ja: 2018年5月2日に参謀総長に任命された。2013年1月以来、主にユニティ州で活動するスーダン人民解放軍第一師団を指揮してきている。スーダン人民解放軍第一師団の司令官としての地位において、敵対行為停止合意に違反し、南スーダンにおける衝突を拡大又は延長させてきた。スーダン人民解放軍は、2014年1月の敵対行為停止合意、及び、敵対行為停止合意への再犯であった 2014年5月9日の南スーダンにおける危機解決合意の違反を含む、南スーダンにおける衝突を延長させている行為に関与し、政府間開発機構（IGAD）監視検証メカニズムの活動を妨害してきた南スーダンの軍事組織である。同人に対するインターポール（国際刑事警察機構）・ 国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/notice/search/un/5879060

    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: ジョンソン・アンドレ（Johnson André）は、「5 Segond」ギャングの主要な指導者であり、ギャング同盟である「G-Pèp alliance」内での影響力を増大させている。同ギャングは、ハイチの安全及び安定を脅かす強姦、強盗、略奪、誘拐、麻薬取引、武器取引、武器弾薬の不法取引及び人道支援の提供への妨害を含む活動に関与した。同人は、ハイチ国家警察に指名手配されている。 過去3年間、同人は「5 Segond」ギャングにて影響力を保ち、ポルトープランスにて暴力行為を行った。さらに、同ギャングは現在も支配下に置く第一審裁判所を含め公共施設に対する攻撃、ハイジャックや誘拐、国内の幹線道路等での移動に制限を加え国内経済の停滞及び人道支援の提供妨害を行った。「5 Segond」ギャングは、不安定な治安環境に乗じ、薬物の密輸を通じ資金を得ている。

    - Yasir Sab'awi Ibrahim Hasan Al-Tikriti
    - Yasir Sabawi Ibrahim Hassan Al-Tikriti （別名2）アリ・タフィール・アブドラ Ali Thafir Abdallah
    reason:
    - ja: A：前イラク政権幹部との関係 入手可能な情報によれば「『イラクの自由』作戦」以後、ヤーセル・サバーウィー・イブラーヒーム・アル・ティクリーティーは、前政権の諸部隊並びにイラク軍及び連合軍並びにイラク国民に対して攻撃を遂行しているグループを支援した。 B：前イラク政権メンバーに対する支援 情報によれば、ヤーセル・サバーウィー・イブラーヒーム・ハサン・アル・ティクリーティーは、米軍によるサッダーム・フセインの拘束以前、同人に資金を提供し、ボディーガードも務めた。さらに、「『イラクの自由』作戦」以後、サッダーム・フセインのために政権党員に対し資金を移転するとともに、サッダーム・フセインの妻（サージダ・ハイラーラ・ティルファーフ）に送金した旨申し立てられている。サージダ・ハイラーラ・ティルファーフは、国連安保理決議1518に基づき設立された委員会に指名され、また、米国政府による大統領令（US Executive Order）13315の附属書に掲載された。 C：新イラク政府・連合軍・イラク国民に対する活動 入手可能な情報によれば、ヤーセル・サバーウィー・イブラーヒーム・ハサン・アル・ティクリーティーは、イラクにおいて多くの反連合軍活動を指揮し、イラクの北部及び中部にかけて反対勢力と連絡を保っていた。また、ヤーセル・サバーウィー・イブラーヒーム・ハサン・アル・ティクリーティーは、財政支援、武器及び爆薬を反連合軍部隊に対して提供した。 D：前イラク政権幹部との近い親類関係 ヤーセル・サバーウィー・イブラーヒーム・アル・ティクリーティーは、前イラク政権幹部と近い親類関係にあることから安保理決議1483の条件に該当する。同人の父、サバーウィー・イブラーヒーム・ハサン・アル・ティクリーティーは、サッダーム・フセインの元大統領顧問であった。

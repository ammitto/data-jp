    aliases:
    - "（a）アブドルハーリク・アル・ホーシー（Abd-al-Khaliq al-Huthi）（b）アブドルハーリク・バドルッディーン・アル・ホーシー(Abd-al-Khaliq Badr-al-Din al Huthi)（c）アブドルハーリク・バドルッディーン・アル・ホーシー(‘Abd al-Khaliq Badr al-Din al-Huthi)（d）アブドルハーリク・アル・ホーシー(Abd al-Khaliq al-Huthi)"
    - アブー・ユーヌス(Abu-Yunus)
    reason:
    - ja: アブドルハーリク・アル・ホーシーは、安全保障理事会決議第2140号（2014年）のパラグラフ17及び18の規定に定めた指定基準に該当し、パラグラフ11及び15の規定に従い、2014年11月7日に制裁対象に指定された。 アブドルハーリク・アル・ホーシーは、イエメンにおける平和的な政権移行のための2011年11月23日のイエメン政府と反政府勢力との合意の実施を妨害する活動及びイエメンにおける政治プロセスを妨害する活動等のイエメンの平和、安全又は安定を脅かす活動に関与してきた。 2013年10月下旬、アブドルハーリク・アル・ホーシーは、イエメン軍の軍服を着た武装集団を率い、イエメンのダンマージュ県各地を攻撃した。戦闘により複数の死者を出した。 2014年9月下旬、アブドルハーリク・アル・ホーシーの指示を受けて、人数及び身元不明の戦闘員らが、イエメンのサヌアにある外交団施設への攻撃を準備していたとされる。アル・ホーシーは、2014年8月30日にアムラン市からサヌア市の同派抗議キャンプへの武器の運搬を調整した。
    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:

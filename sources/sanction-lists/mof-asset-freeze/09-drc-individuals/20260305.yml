    remarks:
    - ja: 2008年1月に人民防衛国民会議（CNDP）を離脱。2011年6月現在、キンシャサ在住。2010年以降、カコレレは2011年3月のコンゴ民主共和国政府の武力紛争終了地域の安定化及び再建計画（STAREC）のゴマ及びベニへのミッション参加を含む、STARECのための活動に関わってきている。コンゴ民主共和国当局は、武装解除・動員解除・社会復帰プロセスの妨害の疑いにより、カコレレを2013年12月、北キヴ州ベニで逮捕した。カコレレは、コンゴ民主共和国を離れ、政府からベニ地方の情勢に対する支援要請を受けて帰国するまで、しばらくの間ケニアに居住。2015年10月、マンバサ(Mambasa)でマイマイのグループを支援した容疑により逮捕されたが起訴されなかった。2016年6月現在、キンシャサ居住。同人に対するインターポール(国際警察刑事機構)・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals

    aliases:
    - "（a）アブー・アリー・アル・ハキーム(Abu Ali al Hakim)（b）アブー・アリー・アル・ハキーム(Abu-Ali al-Hakim)（c）アブダッラー・アル・ハキーム(Abdallah al-Hakim)（d）アブー・アリー・アル・ハキーム(Abu Ali Alhakim)（e）アブダッラー・アル・ムアイヤド(Abdallah al–Mu’ayyad)"
    reason:
    - ja: アブドッラー・ヤヒヤー・アル・ハキームは、安全保障理事会決議第2140号（2014年）のパラグラフ17及び18の規定に定めた指定基準に該当し、パラグラフ11及び15の規定に従い，2014年11月7日に制裁対象に指定された。 アブドッラー・ヤヒヤー・アル・ハキームは，イエメンにおける平和的な政権移行のための2011年11月23日のイエメン政府と反政府勢力との合意の実施及びイエメンにおける政治プロセスを妨害する等，イエメンの平和，安全又は安定を脅かす活動に関与してきた。 2014年6月，アブドッラー・ヤヒヤー・アル・ハキームは，アブドラッボ・マンスール・ハーディ・イエメン大統領に対するクーデターを計画する会合を開催したとされる。アル・ハキームは，軍・治安部隊司令官と会った。アリー・アブドッラー・サーレハ前イエメン大統領に忠実な党派の指導者である部族長らもイエメンの首都サヌアを乗っ取る軍事的な試みを調整することを目的としたこの会合に出席した。 2014年8月29日，議長声明において，国連安全保障理事会議長は，2014年7月8日にイエメン軍師団本部を含めイエメンのアムラン市を制圧したアブドッラー・ヤヒヤー・アル・ハキームにより指揮された軍隊の行動を非難した。アル・ハキームは，2014年7月のアムラン県の暴力的な制圧を主導し，イエメンのアムラン県及びハムダーン郡で行われていた紛争に関する決定を下す権限を有する軍事司令官であった。 2014年9月初旬時点で，アブドッラー・ヤヒヤー・アル・ハキームは，戦闘開始に備え，戦闘作戦行動を監督するためにサヌア県に滞在していた。アル・ハキームの役割は，イエメン政府を転覆させる軍事行動を組織することであり，アル・ハキームは，サヌア県に出入りする全ての道路を確保し，管理する責任を負っていた。

    remarks:
    - ja: ビ・シディ・スルマンは、中央アフリカ共和国を拠点とする民兵集団「帰還・要求・復権（Retour, Réclamation, Réhabilitation）（３Ｒ）」を率いており、2015年の結成以来、市民の殺害、拷問、強姦及び強制移住、武器の不法取引、違法な課税活動並びに他の民兵との武力衝突を行ってきた。ビ・シディ・スルマン自身も拷問に参加してきた。2019年2月6日、３Ｒは中央アフリカ共和国の平和と和解のための政治協定に署名したが、同協定に違反する行為に関与しており、中央アフリカ共和国の平和、安定及び安全に対する脅威であり続けている。例えば、2019年5月21日、３Ｒは、３つの村で非武装の文民34名を殺害し、成人男性を即決処刑した。ビ・シディ・スルマンは、これら攻撃が行われた日に３Ｒの部隊にこれらの村に向かうよう指示したことを国連機関に対して公然と認めたが、３Ｒに殺害指示を与えたことは認めなかった。2020年12月、選挙プロセスを阻害するために設立された武装集団の連合に参加した後、ビ・シディ・スルマンは戦闘において殺害されたと報告されている。写真はインターポール(国際刑事警察機構)・国連安全保障理事会特別手配書に含まれているものを利用可能。同人に対するインターポール(国際刑事警察機構)・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals

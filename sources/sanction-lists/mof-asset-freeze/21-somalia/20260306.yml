      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: パスポート番号：514146（発行地：イエメン・サナア） IDカード番号：1417576（発行地：イエメン・アルアマナ）、発行日：1996年1月7日 フェレス・モハンメド・マナアは、武器禁輸に違反し、ソマリアに武器又は関連物資を、直接的又は間接的に、供給、販売または移送してきた。マナアは、武器売人として知られている。イエメンでは人口を上回る数の武器が流入しているとされるが、2009年10月、イエメン政府は、国内の武器流通を取り締まる努力の一環として、同人を筆頭とする武器商人のブラックリストを公表した。イエメン事情に詳しいコメンテーターで、半年毎の国別報告書の執筆者であり、またジェインズ・インテリジェンス・グループにも貢献する米国人ジャーナリストによると、「ファリス・マナアは主要な武器売人であり、そのことはよく知られている」とされる。2007年12月のイエメン・タイムズの記事は、同人を「武器商人シェイク・フェレス・マハメド・マナア」と書いている。また、2008年1月のイエメン・タイムズの記事は、同人を「武器貿易人シャイク・ファリス・マナア」と書いている。 2008年半ば現在、イエメンは、アフリカの角地域、特にソマリアへの小型船による不法武器貿易の中核として機能し続けている。未確認情報によれば、ファリス・マナアは、ソマリアへの数々の船舶輸送に関与していた。2004年、マナアは、東欧の武器市場からソマリア人兵士に売買されたとされる武器契約に関わった。1992年以降のソマリアに対する国連の武器禁輸措置にもかかわらず、マナアによるソマリアへの武器密輸関与は少なくとも2003年まで遡ることができる。マナアは、2003年、東欧から数千もの武器購入を申し入れ、武器の一部をソマリアで売却する計画を示唆した。

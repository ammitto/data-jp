- type: clause
  index: '5'
  label: 第五条
  title: "（税関の確認等）"
  content:
  - 税関は、経済産業大臣の指示に従い、貨物を輸出しようとする者が法第四十八条第一項の規定若しくは第一条第三項の規定による許可若しくは第二条第一項の規定による承認を受けていること又は当該許可若しくは承認を受けることを要しないことを確認しなければならない。
  - 税関は、前項の規定による確認をしたときは、経済産業省令で定めるところにより、その結果を経済産業大臣に通知するものとする。
- type: clause
  index: '6'
  label: 第六条
  content:
  - 削除
- type: clause
  index: '7'
  label: 第七条
  title: "（輸出の事後審査）"
  content:
  - 経済産業大臣は、第十一条の規定による報告により、当該貨物の輸出が法令の規定に従つているか否かを審査するものとする。
- type: clause
  index: '8'
  label: 第八条
  title: "（許可及び承認の有効期間）"
  content:
  - 法第四十八条第一項の規定及び第一条第三項の規定による許可並びに第二条第一項の規定による承認の有効期間は、その許可又は承認をした日から六月とする。
  - 経済産業大臣は、特に必要があると認めるときは、前項に規定する許可又は承認について、同項の期間と異なる有効期間を定め、又はその有効期間を延長することができる。
- type: clause
  index: '9'
  label: 第九条
  title: "（法令の違反に対する制裁の通知）"
  content:
  - 経済産業大臣は、法第五十三条第一項又は第二項の規定による処分をしたときは、その旨を遅滞なく税関に通知するものとする。
- type: clause
  index: '10'
  label: 第十条
  title: "（使用人）"
  content:
  - 法第五十三条第四項第一号に規定する政令で定める使用人は、使用人のうち、次に掲げる者とする。
  - type: numbered-list
    index: '1'
    content:
    - type: list-item

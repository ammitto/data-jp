    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: ロガルチェオS.Aとアビアトランス・アンスタルトは前イラク政権と前政権高官の財産を管理するために設立された2つの関連会社である。スイスの会社であるロガルチェロは、最終的にはサッダーム・フセインによって所有されるフランスの不動産管理会社の所有者であり管理者であると伝えられている。リヒテンシュタインの会社であるアビアトランスは、イラク通信省がイラク空軍の財源で購入し、イラク政府高官の移動に用いられるジェット機ファルコン50の登録された所有者、管理者であったと報じられている。 イラク諜報機関の投資責任者であるハラフ・アル・ドゥレィミーはロガルチェロとアビアトランスを管理していた。ジェット機ファルコン50の真正な所有権を更に隠蔽するため、イラクの航空整備士のハサン・アフマド・S・アドナーンがその所有者としてリストに掲載されていた。当該航空機に対するイラク前政権の権益を認識したことから、リヒテンシュタイン当局は最近になって当該ジェット機の登録を抹消し、法定所有者であるアビアトランスに対する精算手続きを開始した。リヒテンシュタイン当局は、「この航空機をイラク再建のために利用できるように」したい旨の意図を表明した。 通商報告とジュネーブ商業登記所によれば、アル・ドゥレイミーはスイスの会社であるミドコ・ファイナンスS.A.の社長、管理者であり、権限ある署名者であったことが示されている。同報告によれば、同人は、モンタネ・マネージメントINCの代表でもある。報道によれば、モンタネはフランスの出版社のハチェッテの8.4％、フランスのミサイル防衛電子機器製造業者マトラの2.5％を所有している。（ハチェッテとマトラは後にフランスの会社ラガルデレＳＣＡに統合された。）

    remarks:
    - ja: マルタン・クンタマジは、2005年にFDPCを設立した。同人は、2012年12月にセレカ連合に加わり、反政府勢力がバンギ（Bangui）において政権を掌握した後、2013年4月に離脱した。同人は、カメルーンにおいて逮捕された後、コンゴ共和国のブラザビル（Brazzaville）に移送された。同人は、中央アフリカ共和国に戻る前にブラザビルにいた際も、中央アフリカ共和国の地にいた自らの部隊の指揮を執り続けていた（2014年11月から2019年までの間。）。FDPCは、2019年2月6日に中央アフリカ共和国の平和と和解のための政治合意に署名したが、マルタン・クンタマジは、中央アフリカ共和国の平和、安定及び安全に対する脅威であり続けている。写真はインターポール(国際刑事警察機構)・国連安全保障理事会特別手配書に含まれているものを利用可能。同人に対するインターポール(国際刑事警察機構)・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals

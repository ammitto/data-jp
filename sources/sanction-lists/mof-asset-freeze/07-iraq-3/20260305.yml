    address: バグダッド、929地区、通路11、ハーイ、バビル バグダッド、オフィス10、エリア902、通路15、ハーイ・アル・ワフダ バグダッド、アルウィーヤ、私書箱2337号
    measures:
    - type:
      - asset_freeze

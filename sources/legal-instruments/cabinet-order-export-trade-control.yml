content:
- type: clause
  index: '1'
  label: 第一条
  title: "（輸出の許可）"
  content:
  - 外国為替及び外国貿易法（昭和二十四年法律第二百二十八号。以下「法」という。）第四十八条第一項に規定する政令で定める特定の地域を仕向地とする特定の種類の貨物の輸出は、別表第一中欄に掲げる貨物の同表下欄に掲げる地域を仕向地とする輸出とする。
  - 法第四十八条第一項の規定による許可を受けようとする者は、経済産業省令で定める手続に従い、当該許可の申請をしなければならない。
  - 別表第一の一六の項の中欄に掲げる貨物を別表第三に掲げる地域を仕向地として輸出しようとする者は、法第四十八条第二項の規定に基づく経済産業大臣の許可を受けなければならない。
  - 第二項の規定は、前項の許可の申請について準用する。
- type: clause
  index: '2'
  label: 第二条
  title: "（輸出の承認）"
  content:
  - 次の各号のいずれかに該当する貨物の輸出をしようとする者は、経済産業省令で定める手続に従い、経済産業大臣の承認を受けなければならない。
  - type: numbered-list
    index: '1'
    content:
    - type: list-item
      index: '1'
      label: 一
      content:
      - 別表第二中欄に掲げる貨物の同表下欄に掲げる地域を仕向地とする輸出
    - type: list-item
      index: '1_2'
      label: 一の二
      content:
      - 別表第二の二に掲げる貨物（別表第二の一、三六、三九から四一まで及び四三から四五までの項の中欄に掲げる貨物を除く。）の北朝鮮を仕向地とする輸出
    - type: list-item
      index: '1_3'
      label: 一の三
      content:
      - 別表第二の三（第一号の二、第二号（３２）から（８５）まで、第二号の二及び第三号を除く。）に掲げる貨物（別表第二の二〇から二一の三まで、二五、三五から三五の四まで、四四及び四五の項の中欄に掲げる貨物を除く。）のベラルーシを仕向地とする輸出
    - type: list-item
      index: '1_4'
      label: 一の四
      content:
      - 別表第二の三に掲げる貨物（別表第二の一、二〇から二一の三まで、二五、三五から三七まで、四〇、四一及び四三から四五までの項の中欄に掲げる貨物を除く。）のロシアを仕向地とする輸出
    - type: list-item
      index: '1_5'
      label: 一の五
      content:
      - ウクライナ（ドネツク州及びルハンスク州の区域のうち、経済産業大臣が告示で定める区域に限る。第四条第三項第二号ヘにおいて同じ。）を仕向地とする貨物（別表第二（三四の項を除く。）中欄に掲げる貨物を除く。）の輸出
    - type: list-item
      index: '1_6'
      label: 一の六
      content:

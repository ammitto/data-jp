      en: Subject to asset freeze
    remarks:
    - ja: ルワンダ共和国で生まれる。幼少時、北キヴ州マシシ郡ニャミタバに転居。イトゥリ和平合意を受け、2004年12月11日の大統領令によりコンゴ民主共和国国軍（FARDC）准将に指名。人民防衛国民会議（CNDP）の元参謀長であり、2009年1月のローラン・ンクンダの逮捕以降、CNDPの軍事司令官。2009年1月以降、南北両キヴ州におけるルワンダ解放民主勢力（FDLR）掃討作戦である「ウモジャ・ウェトゥ」、「キミアⅡ」、「アマニ・レオ」の事実上の司令官補。2013年3月、ルワンダ共和国に入国、3月22日にキガリにて国際刑事裁判所（ICC）職員に自主的に投降した。オランダ・ハーグの国際刑事裁判所に移送。2014年6月9日、ICCは、同人に対する13の戦争犯罪と5の人道に対する罪を確認した。審理は2015年9月に開始。2019年7月8日、ICCは、同人が2002年から2003年にイトゥリにおいて犯した戦争犯罪及び人道に対する罪18件について有罪判決を下した。2019年11月7日、同人は、計30年の禁錮刑を言い渡された。同人は、有罪判決及び量刑の両方について上訴した。2021年3月30日、ICC上訴裁判所は同人の有罪判決及び量刑を確定した。2022年12月14日、刑の執行のため、同人はベルギーに移送された。同人に対するインターポール(国際警察刑事機構)・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals

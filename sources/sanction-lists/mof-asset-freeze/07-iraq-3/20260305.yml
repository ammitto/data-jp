      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: 登録された会社番号：02150590 最新の既知の管理者：ハナ・ポール・ジョン Hana Paul JON、アドナン・タリブ・ハーシム・アル・アミーリーAdnan Talib Hashim AL-AMIRI、サファ・ハディ・ジャワード・アル・ハボビ博士Dr. Safa Hadi Jawad AL-HABOBI 最新の既知の株主：99通常債権：アル・アラビー貿易有限会社Al-Arabi Trading Co. Ltd.、1通常債権：アル・ハボビ博士Dr. Al-Habobi TDG Ltd.は、1987年に英国で設立、登録され、イラクで設立されたアル・アラビー貿易会社が所有している。英国の会社登記所（Companies House）の最新のTDG Ltd.に関するAnnual Return はアル・アラビー貿易会社が2002年4月にTDGの99パーセントの株式を保有していたことを示している。アル・アラビー貿易会社は、2004年4月26日に、国連安保理決議1518に基づき設立された委員会により、決議1483主文23(b)に基づく団体に指定された［上記リスト203番を参照］。 　T.M.G.エンジニアリング有限会社［下記リスト208番参照］は、TDG Ltd.がほぼ全てを所有する英国で登録された会社である。したがって、T.M.G.エンジニアリング有限会社はアル・アラビー貿易会社の事実上の子会社と見られる。TDG Ltd.は、子会社であるT.M.G.エンジニアリング有限会社を通じて、1980年代にイラクの軍工業化の調達努力において鍵となる役割を果たしていたことで知られるMatrix Churchill企業グループのかなりの株式を所有していた。T.M.G. Shareholders Echosabre Ltd.とAdminchck Ltd.はMatrix Churchill グループの一部であった。

    - ja: ヴィトロム・イノソンは、首都圏で最も力を有するギャングの一つである「Kraze Barye」ギャングの指導者であり、ハイチの安全及び安定を脅かす様々な活動に関与した。 同人の指導の下、「Kraze Barye」ギャングによる基本的人権への侵害及び殺人、強姦、子どもの徴用、武器の略奪、財産の略奪及び破壊、身代金誘拐、車両窃盗及び土地の接収を含め犯罪行為が行われた。同人は、ハイチ国家警察より指名手配を受けている。 「Kraze Barye」ギャングは様々な機会で、ハイチ国家警察を標的とし、複数名の警官の殺害及び警察署の損壊を行った。過去3年間、首都圏近郊の自治体にて繰り返し攻撃を行い、数千名の市民が避難を余儀なくされた。 同人は、政府主要人物及び著名な記者等を標的とした誘拐を企図した。

    remarks:
    - ja: 現存しないと報告されている。本部はパキスタンにあった。アフガニスタン（Herat Jalalabad、Kabul、Kandahar 及びMazar Sherif）において活動。コソヴォ及びチェチェンにおいても活動。アル・カーイダ及びタリバーンの資金調達に関与している。この団体は、２００８年１０月２１日まで、国連の資産凍結措置対象者リストに掲載されていたウレマ援助組織（２００２年４月２４日に制裁対象リストに掲載され２００６年７月２５日に改訂された。）の名称の下でも掲載されていた。２００８年１０月２１日、アル・ラシード信託及びウレマ援助組織をこの団体に統合した。国連の資産凍結措置対象者リストに掲載されていたムフティ・ラシド・アフマド・ラディヤノイによって設立された。国連の資産凍結措置対象者リストに掲載されているジャイシ・モハンメドと関係がある。２００１年１０月からパキスタンにおいて活動が禁止された。２０２３年１１月時点で、アル・ラシード信託名義での活動は確認されていない。国連安全保障理事会決議第１８２２号（２００８年）に基づく見直しは２０１０年５月６日に終了した。国連安全保障理事会決議第２３６８号（２０１７年）に基づく見直しは２０１９年１２月４日に終了した。国連安全保障理事会決議第２６１０号（２０２１年）に基づく見直しは２０２３年１０月３０日に終了した。同団体に対するインターポール（国際刑事警察機構）・国連安全保障理事会特別手配書のウェブ・リンク：https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Entities

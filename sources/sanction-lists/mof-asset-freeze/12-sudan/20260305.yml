    date_of_birth: '1952-06-24'
    list_date: '2006-04-25'
    aliases:
    - ガアファル・モハメッド・エルハサン (Gaffar Mohmed Elhassan)
    reason:
    - ja: 専門家パネルの報告において、ガアファル・ムハンマド・エルハサン少将は専門家パネルに対して、西部地域司令官在任中、ダルフールにおけるすべての部隊への直接的な作戦指揮権（主に戦術指揮）を有していたと述べた。同人は、2004年11月頃から2006年初めまで西部地域司令官の職にあった。パネルの情報によると、同人は、この職により、委員会の事前承認なくダルフールへの軍用装備の移動を（ハルツームから）要求し（2005年3月29日以降、）許可し、国連安保理決議1591のパラ7違反の責任を有した。同人自身、専門家パネルに対し2005年3月29日から2005年12月までの間、スーダンの他の地域からダルフールへ航空機、航空機エンジン、その他の軍用装備を持ち込んだ旨認めた。例えば、同人は、専門家パネルに対し2005年9月18日から21日の間、Mi-24攻撃ヘリコプター2機をダルフールに許可なく持ち込んだ旨伝えた。同人が西部地域司令官として、2005年7月23日、24日のアブ・ハムラ周辺地域及び2005年11月19日の西ダルフール・ジャバル・ムーン地域への航空攻撃を許可したことについて、直接的な責任を有すると信じるに至る合理的な根拠もある。両作戦には、Mi-24攻撃ヘリコプターが関与しており、伝えられるところでは両作戦において射撃を行った。専門家パネルの報告では、同人自身が専門家パネルに対し西部地域司令官として、航空支援及び他の航空作戦の要請を承認した旨示唆した。（専門家パネル報告S/2006/65パラ266-269参照。）同人は、このような行為を通じて、国連安保理決議第1591号の関連規定に違反しており、したがって委員会により指定される制裁の対象とされるべき基準を満たしている。

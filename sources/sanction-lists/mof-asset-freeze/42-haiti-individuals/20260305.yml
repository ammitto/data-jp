    remarks:
    - ja: ジョブネル・モイーズ大統領の下で大統領府警護総局長を務めたディミトリ・エラール（Dimitri Herard）は、ハイチの平和、治安、安定を脅かす行為に関与し、同国の制度を損ない人道危機を悪化させる犯罪行為を支援してきた。同人は、ハイチにおける犯罪ネットワークやギャングの活動を容易にする上で重要な役割を果たし、ギャング「Ti Bwa」が特殊戦闘ユニットを創設することを支援する等した。同人はまた、ギャングの暴力を激化させ、国家を不安定化させた武器・弾薬の密輸を助長した疑いがある。
  - id: jp.mof.haiti-individuals.9
    name:
      ja: ケンペス・サノン
      en: KEMPES SANON
    type: individual
    effective_date: '2025-11-25'
    sanction_list: jp/mof-asset-freeze-haiti-individuals
    sanction_list_en: Republic of Haiti (Individuals)
    list_date: '2025-10-17'
    reason:
    - ja: '国連参照番号: HTi.009'
    measures:
    - type:
      - asset_freeze
      ja: 資産凍結の対象
      en: Subject to asset freeze
    remarks:
    - ja: ケンペス・サノン（Kempes Sanon）は、ポルトープランスのオー・ベル・エール地区を拠点とするギャング「Les Argentins」のリーダーとして、ハイチの平和、治安、安定を脅かす活動に関与してきた。同ギャングは約150名の構成員を有し、恐喝、誘拐、違法課税を含む組織的な人権侵害に関与している。同人は、特に、ギャング連合「Viv Ansanm」同盟への関与を通じ、ポルトープランスにおけるギャング勢力の統合に重要な役割を果たしてきた。同人の指導の下、ギャング「Les Argentins」はソリノ地区等への攻撃を繰り返し、多数の死傷者と数千人の国内避難民を発生させた。同人は、治安機関を含む政府機関内に個人ネットワークを維持しており、逮捕されることなく犯罪行為を継続している。2021年には誘拐・窃盗・暗殺罪で服役中の刑務所から脱獄し、その後もハイチの不安定化を助長している。

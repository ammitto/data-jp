content:
- type: chapter
  index: "1"
  label: 第一章
  title: 総則
  content:
  - type: clause
    index: "1"
    label: 第一条
    title: （目的）
    content:
    - この法律は、外国為替、外国貿易その他の対外取引が自由に行われることを基本とし、対外取引に対し必要最小限の管理又は調整を行うことにより、対外取引の正常な発展並びに我が国又は国際社会の平和及び安全の維持を期し、もつて国際収支の均衡及び通貨の安定を図るとともに我が国経済の健全な発展に寄与することを目的とする。

  - type: clause
    index: "2-4"
    label: 第二条
    title: 第二条から第四条まで
    content:
    - 削除

  - type: clause
    index: "5"
    label: 第五条
    title: （適用範囲）
    content:
    - この法律は、本邦内に主たる事務所を有する法人の代表者、代理人、使用人その他の従業者が、外国においてその法人の財産又は業務についてした行為にも適用する。

    - 本邦内に住所を有する人又はその代理人、使用人その他の従業者が、外国においてその人の財産又は業務についてした行為についても、同様とする。

  - type: clause
    index: "6"
    label: 第六条
    title: （定義）
    content:
    - この法律又はこの法律に基づく命令において、次の各号に掲げる用語の意義は、当該各号に定めるところによる。

    - type: numbered-list
      index: "1"
      content:

      - type: list-item
        index: "1"
        label: 一
        content:
        - 「本邦」とは、本州、北海道、四国、九州及び財務省令・経済産業省令で定めるその附属の島をいう。

      - type: list-item
        index: "2"
        label: 二
        content:
        - 「外国」とは、本邦以外の地域をいう。

      - type: list-item
        index: "3"
        label: 三
        content:
        - 「本邦通貨」とは、日本円を単位とする通貨をいう。
      - type: list-item
        index: "4"
        label: 四
        content:
        - 「外国通貨」とは、本邦通貨以外の通貨をいう。

      - type: list-item
        index: "5"
        label: 五
        content:
        - 「居住者」とは、本邦内に住所又は居所を有する自然人及び本邦内に主たる事務所を有する法人をいう。
        - 非居住者の本邦内の支店、出張所その他の事務所は、法律上代理権があると否とにかかわらず、その主たる事務所が外国にある場合においても居住者とみなす。
      - type: list-item
        index: "6"
        label: 六
        content:
        - 「非居住者」とは、居住者以外の自然人及び法人をいう。
      - type: list-item
        index: "7"
        label: 七
        content:
        - 「支払手段」とは、次に掲げるものをいう。

        - type: numbered-list
          content:
          - type: list-item
            index: 1
            label: イ
            content:
            - 銀行券、政府紙幣及び硬貨
          - type: list-item
            index: 2
            label: ロ
            content:
            - 小切手（旅行小切手を含む。）、為替手形、郵便為替及び信用状

          - type: list-item
            index: 3
            label: ハ
            content:
            - 証票、電子機器その他の物（第十九条第一項において「証票等」という。）に電磁的方法（電子的方法、磁気的方法その他の人の知覚によつて認識することができない方法をいう。）により入力されている財産的価値であつて、不特定又は多数の者相互間での支払のために使用することができるもの（その使用の状況が通貨のそれと近似しているものとして政令で定めるものに限る。）
          - type: list-item
            index: 4
            label: ニ
            content:
            - イ又はロに掲げるものに準ずるものとして政令で定めるもの

        - type: list-item
          index: 8
          label: 八
          content:
          - 「対外支払手段」とは、外国通貨その他通貨の単位のいかんにかかわらず、外国通貨をもつて表示され、又は外国において支払のために使用することのできる支払手段（本邦通貨を除く。）をいう。

        - type: list-item
          index: 9
          label: 九
          content:
          - 「電子決済手段等」とは、次に掲げるものをいう。

          - type: numbered-list
            index: 1
            content:
              - type: list-item
                index: 1
                label: イ
                content:
                - 電子決済手段（資金決済に関する法律（平成二十一年法律第五十九号）第二条第五項に規定する電子決済手段をいう。第十六条の二の表の一の項の下欄、第十七条の四第二項及び第十八条の六第二項において同じ。）

              - type: list-item
                index: 2
                label: ロ
                content:
                - 暗号資産（資金決済に関する法律第二条第十四項に規定する暗号資産をいう。第十六条の二の表の五の項の下欄において同じ。）



        - type: list-item
          index: 10
          label: 十
          content:
          - 「貴金属」とは、金の地金、金の合金の地金、流通していない金貨その他金を主たる材料とする物をいう。

        - type: list-item
          index: 11
          label: 十一
          content:
          - 「証券」とは、券面が発行されていると否とを問わず、公債、社債、株式、出資の持分、公債又は株式に関する権利を与える証書、債券、国庫証券、抵当証券、利潤証券、利札、配当金受領証、利札引換券その他これらに類する証券又は証書として政令で定めるものをいう。
        - type: list-item
          index: 12
          label: 十二
          content:
          - 「外貨証券」とは、外国において支払を受けることができる証券又は外国通貨をもつて表示される証券をいう。
        - type: list-item
          index: 13
          label: 十三
          content:
          - 「債権」とは、定期預金、当座預金、特別当座預金、通知預金、保険証券及び当座勘定残高並びに貸借、入札その他により生ずる金銭債権で前各号に掲げられていないものをいう。
        - type: list-item
          index: 14
          label: 十四
          content:
          - 「金融指標等先物契約」とは、金融商品取引法（昭和二十三年法律第二十五号）第二条第二十一項に規定する市場デリバティブ取引（政令で定めるものを除く。以下この号において同じ。）、同条第二十二項に規定する店頭デリバティブ取引（政令で定めるものを除く。）及び同条第八項第三号ロに規定する外国金融商品市場において行われる同条第二十一項に規定する市場デリバティブ取引に類する取引その他これらに類する取引として政令で定める取引に係る契約をいう。
        - type: list-item
          index: 15
          label: 十五
          content:
          - 「貨物」とは、貴金属、支払手段及び証券その他債権を化体する証書以外の動産をいう。
        - type: list-item
          index: 16
          label: 十六
          content:
          - 「財産」とは、第七号、第九号から第十一号まで、第十三号及び前号に規定するものを含む財産をいう。
        - type: list-item
          index: 17
          label: 十七
          content:
          - 居住者又は非居住者の区別が明白でない場合については、財務大臣の定めるところによる。
